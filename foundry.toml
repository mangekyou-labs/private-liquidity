[profile.default]
isolate = true
src = "src"
out = "out"
libs = ["node_modules", "lib"]
ffi = false
fs_permissions = [{ access = "read-write", path = ".forge-snapshots/"}]
solc_version = "0.8.26"
evm_version = "cancun"
auto_detect_remappings = false
via_ir = true
optimizer = true
optimizer_runs = 200

remappings = [
    '@uniswap/v4-core/=/Users/kyler/repos/liquidity-tracker/node_modules/@uniswap/v4-core/',
    'forge-std/=/Users/kyler/repos/liquidity-tracker/node_modules/forge-std/src/',
    'v4-periphery/=/Users/kyler/repos/liquidity-tracker/node_modules/@uniswap/v4-periphery/',
    '@openzeppelin/contracts-upgradeable/=/Users/kyler/repos/liquidity-tracker/node_modules/@openzeppelin/contracts-upgradeable/',
    '@openzeppelin/contracts/=/Users/kyler/repos/liquidity-tracker/node_modules/@openzeppelin/contracts/',
    'permit2/=/Users/kyler/repos/liquidity-tracker/node_modules/@uniswap/v4-periphery/lib/permit2/',
    'solmate/=/Users/kyler/repos/liquidity-tracker/node_modules/@uniswap/v4-core/lib/solmate/',
]