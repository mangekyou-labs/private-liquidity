[profile.default]
isolate = true
src = "src"
out = "out"
libs = ["lib", "node_modules"]
solc_version = "0.8.27"
evm_version = "cancun"
via_ir = true
optimizer = true
optimizer_runs = 200
ffi = false
fs_permissions = [{ access = "read-write", path = ".forge-snapshots/"}]

remappings = [
    "@fhevm/solidity/=node_modules/@fhevm/solidity/",
    "encrypted-types/=node_modules/encrypted-types/",
    "forge-std/=node_modules/forge-std/src/",
    "forge-fhevm/=lib/forge-fhevm/src/",
    "@openzeppelin/contracts/=node_modules/@openzeppelin/contracts/",
    "@uniswap/v4-core/=node_modules/@uniswap/v4-core/",
    "@uniswap/v4-periphery/=node_modules/@uniswap/v4-periphery/",
    "solmate/=node_modules/@uniswap/v4-periphery/lib/solmate/src/",
]

[dependencies]
forge-fhevm = { version = "eba2324", git = "https://github.com/zama-ai/forge-fhevm.git", rev = "eba2324" }
forge-std = { version = "1.0.0", git = "https://github.com/foundry-rs/foundry", tag = "v1.0.0" }